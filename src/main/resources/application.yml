server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: seed-platform
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: always  # 显示详细状态