version: '3.8'
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seed_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:3.2
    ports:
      - "6379:6379"

  app:
    volumes:
      - ./data/uploads:/data/uploads

volumes:
  mysql_data: